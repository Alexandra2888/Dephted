name: evals

# Gate on changes that can move agent behavior: prompts, graph wiring, agents, scorers.
on:
  pull_request:
    paths:
      - "server/prompts/**"
      - "server/graph.py"
      - "server/agents/**"
      - "server/evals/**"

jobs:
  evals:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run eval suite
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run python -m evals.run --threshold 0.6
